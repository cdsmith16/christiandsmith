<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Whiteout: Logo Background Remover</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #f9fafb;
            color: #111827;
            margin: 0;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h2 {
            margin: 0 0 8px 0;
            font-size: 28px;
        }
        .header p {
            margin: 0;
            color: #6b7280;
        }
        canvas {
            max-width: 90vw;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            background-image:
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .controls {
            margin-bottom: 24px;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        input[type="file"] {
            margin-bottom: 20px;
            width: 100%;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .slider-container:last-child {
            margin-bottom: 0;
        }
        input[type="range"] {
            flex-grow: 1;
        }
        label {
            font-size: 14px;
            color: #374151;
            min-width: 80px;
        }
        .badge {
            background: #3b82f6;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            min-width: 32px;
            text-align: center;
        }
        .download-btn {
            margin-top: 16px;
            width: 100%;
            padding: 10px 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
        .download-btn:hover {
            background: #059669;
        }
        .download-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="header">
    <h2>Whiteout</h2>
    <p>Upload a logo and slide to remove the background.</p>
</div>
<div class="controls">
    <input type="file" id="upload" accept="image/png, image/jpeg, image/webp">
    <div class="slider-container">
        <label>Threshold:</label>
        <input type="range" id="threshold" min="0" max="255" value="246">
        <span class="badge" id="val">246</span>
    </div>
    <div class="slider-container">
        <label>Tolerance:</label>
        <input type="range" id="tolerance" min="0" max="60" value="0">
        <span class="badge" id="tolVal">0</span>
    </div>
    <button class="download-btn" id="download" disabled>Download PNG</button>
</div>
<canvas id="canvas"></canvas>
<script>
    const upload = document.getElementById('upload');
    const thresholdSlider = document.getElementById('threshold');
    const toleranceSlider = document.getElementById('tolerance');
    const valDisplay = document.getElementById('val');
    const tolDisplay = document.getElementById('tolVal');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const downloadBtn = document.getElementById('download');

    let originalImage = null;

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                canvas.width = img.width;
                canvas.height = img.height;
                downloadBtn.disabled = false;
                processImage();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    thresholdSlider.oninput = () => {
        valDisplay.innerText = thresholdSlider.value;
        if (originalImage) processImage();
    };

    toleranceSlider.oninput = () => {
        tolDisplay.innerText = toleranceSlider.value;
        if (originalImage) processImage();
    };

    function processImage() {
        if (!originalImage) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(originalImage, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const thresh = parseInt(thresholdSlider.value, 10);
        const tol = parseInt(toleranceSlider.value, 10);

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];

            // Remove true whites above threshold
            if (r >= thresh && g >= thresh && b >= thresh) {
                data[i + 3] = 0;
            } else if (tol > 0) {
                // Feather edges: partially transparent pixels near the threshold
                const minChannel = Math.min(r, g, b);
                if (minChannel >= thresh - tol) {
                    const fade = (minChannel - (thresh - tol)) / tol;
                    data[i + 3] = Math.round(data[i + 3] * (1 - fade));
                }
            }
        }

        ctx.putImageData(imageData, 0, 0);
    }

    downloadBtn.onclick = () => {
        if (!originalImage) return;
        const link = document.createElement('a');
        link.download = 'whiteout-' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
</script>
</body>
</html>
